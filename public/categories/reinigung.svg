<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="480" viewBox="0 0 640 480" role="img" aria-label="Reinigung">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3F2E3E"/>
      <stop offset="100%" stop-color="#BE185D"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="640" height="480" rx="36" fill="url(#g)"/>
  <circle cx="520" cy="70" r="90" fill="#ffffff" opacity="0.10"/>
  <circle cx="80" cy="420" r="120" fill="#ffffff" opacity="0.08"/>
  <text x="320" y="210" text-anchor="middle" font-size="92" filter="url(#soft)">🧽</text>
  <text x="320" y="300" text-anchor="middle" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700">Reinigung</text>
  <text x="320" y="340" text-anchor="middle" fill="#ffffff" opacity="0.85" font-family="system-ui, -apple-system, sans-serif" font-size="16">IGZ Vergleich</text>
